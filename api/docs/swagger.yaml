basePath: /api/v1
definitions:
  errors.CustomError:
    properties:
      code:
        type: integer
      internalCode:
        type: string
      message:
        type: string
    type: object
  local.GetLocalsByComunaResponse:
    properties:
      locals:
        items:
          $ref: '#/definitions/model.Local'
        type: array
    type: object
  model.Local:
    properties:
      address:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  model.Patient:
    properties:
      birthdate:
        type: string
      documentNumber:
        type: string
      documentType:
        type: string
      email:
        type: string
      gender:
        type: string
      lastName:
        type: string
      name:
        type: string
      phone:
        type: string
      secondLastName:
        type: string
    type: object
  patient.GetResponse:
    properties:
      patient:
        $ref: '#/definitions/model.Patient'
    type: object
host: localhost:1323
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server Petstore server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Swagger Example API
  version: "1.0"
paths:
  /patients/{documentType}/{documentNumber}:
    get:
      consumes:
      - application/json
      description: gts patient by document type and document number
      operationId: patientsGet
      parameters:
      - description: Document Type
        in: path
        name: documentType
        required: true
        type: string
      - description: Doument Number
        in: path
        name: documentNumber
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/patient.GetResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.CustomError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.CustomError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.CustomError'
      summary: Get patient
      tags:
      - Patients
  /pharmacy/locals/{commune}:
    get:
      consumes:
      - application/json
      description: obtiene locales al ingresarse una comuna
      operationId: getLocalsByCommune
      parameters:
      - description: Comuna
        in: path
        name: commune
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/local.GetLocalsByComunaResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.CustomError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.CustomError'
      summary: Get locals
      tags:
      - Locals
swagger: "2.0"
